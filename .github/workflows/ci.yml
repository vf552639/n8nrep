name: CI
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: seo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U postgres -d seo_test
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Ruff check (schemas + logging)
        run: ruff check app/schemas app/logging_config.py app/workers/celery_app.py
      - name: Ruff format
        run: ruff format --check app/schemas app/logging_config.py app/workers/celery_app.py
      - name: Apply database migrations
        env:
          SUPABASE_DB_URL: postgresql://postgres:postgres@localhost:5432/seo_test
        run: alembic upgrade head
      - name: Pytest
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/seo_test
          REDIS_URL: redis://localhost:6379/0
          SUPABASE_DB_URL: postgresql://postgres:postgres@localhost:5432/seo_test
          SUPABASE_URL: http://localhost
          SUPABASE_KEY: test
          API_KEY: ""
          OPENROUTER_API_KEY: test
        run: pytest -m "not integration" --cov=app --cov-report=term-missing -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

[tool.ruff]
line-length = 110
target-version = "py312"
extend-exclude = ["alembic/versions", "frontend"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "SIM", "RUF"]
ignore = [
    "E501",
    "B008",    # FastAPI Depends() in default args — idiomatic
    "RUF001",  # ambiguous unicode (Russian text in strings)
    "RUF002",  # ambiguous unicode in docstrings
    "RUF013",  # implicit Optional — valid Python 3.12
    "E402",    # module-level import not at top (needed for conditional imports)
    "SIM102",  # collapsible-if — readability preference
    "SIM105",  # suppressible-exception — try/except/pass is clearer
    "SIM108",  # ternary — readability preference
    "SIM118",  # in dict.keys() — explicit is fine
    "SIM210",  # if-expr-with-true-false — explicit is fine
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B", "SIM"]
"scripts/*" = ["B", "SIM"]
"app/services/template_engine.py" = ["RUF001"]
"app/services/pipeline.py" = ["F403", "F405"]  # intentional import * from pipeline_constants

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
filterwarnings = ["ignore::DeprecationWarning"]
addopts = "-ra --strict-markers"
markers = [
    "integration: tests that hit a real DB",
    "slow: tests > 1s",
]

[tool.coverage.report]
skip_empty = true
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
]

[tool.mypy]
python_version = "3.12"
files = ["app/services/llm.py", "app/services/json_parser.py", "app/services/meta_parser.py"]
strict = true
ignore_missing_imports = true

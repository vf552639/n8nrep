services:
  web:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/docs" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  worker:
    build: .
    command: celery -A app.workers.celery_app worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "celery -A app.workers.celery_app inspect ping || exit 1" ]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 20s

  beat:
    build: .
    command: celery -A app.workers.celery_app beat --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    # Host port: default 3001 to avoid conflict with another process on 3000 (e.g. local `npm run dev`).
    # Use 3000: `FRONTEND_HOST_PORT=3000 docker compose up -d` or set FRONTEND_HOST_PORT in `.env`.
    ports:
      - "${FRONTEND_HOST_PORT:-3001}:3000"
    env_file:
      - .env
    depends_on:
      web:
        condition: service_healthy
